name: Build & Deploy to cPanel branch

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci || npm install

      - name: Build
        run: npm run build

      - name: Ensure .htaccess is in dist
        run: |
          if [ -f public/.htaccess ]; then cp public/.htaccess dist/.htaccess; fi

      - name: Publish dist to "deploy" branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd dist
          git init -b deploy
          git config user.email "actions@github.com"
          git config user.name  "GitHub Actions"
          git add -A
          git commit -m "deploy: $GITHUB_SHA"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" deploy
